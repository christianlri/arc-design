name: rb_nonstandard_orders
table_description: |
  This table identifies and categorizes non-standard purchase orders based on their parent-child relationships and delivery dates to ensure accurate rebate calculations.

  ### Key

  PK: Not explicitly defined, likely a composite key of `order_id`, `country_code`, and potentially `sup_id`.

  ### Partitioning column

  ### Sources

  - `fulfillment-dwh-production.cl_dmart.rb_purchase_orders`

  ### Life cycle

  Stable.

  ### Data freshness

  This is an incremental table. The last month data are updated/appended with each run (first day of every month).

  ### Owner
  - Team: QCommerce Data Analytics - Commercial team
  - Email: qc_analytics@deliveryhero.com

columns_description:
  - order_type: |
      Categorizes the order as 'regular', 'last_updated_po', 'original_of_last_updated_po', or 'updated_next_months'.
  - order_id: |
      Unique identifier for the purchase order.
  - sup_id: |
      Supplier ID.
  - country_code: |
      Two-letter country code.
  - purchase_order_status: |
      Status of the purchase order.
  - order_delivery_date: |
      Timestamp when the order was delivered.
  - warehouse_type: |
      Type of warehouse ('DMART' or 'DISTRIBUTION CENTER').
  - warehouse_id: |
      ID of the warehouse.

dependencies:
  - rb_purchase_orders
template_params:
  param_country_code: '"eg|cl|sg|th|hu|es|jo|kw|ar|ae|qa|pe|tr|ua|it|om|bh|hk|ph|sa|pa|py|bo"'
  param_inbounded_country_code: '"ar|tr"'
is_stream: true
backfill_chunks:
  is_enabled: true
copy_partitions:
  partition_dates_sql: rb_get_updated_partitions.sql
time_partitioning: month
