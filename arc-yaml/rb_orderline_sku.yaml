name: rb_orderline_sku
table_description: |
  Calculates monthly aggregated metrics for SKUs, including net and gross price and the delivered and returned quantities, based on country, supplier, order type and product data.

  ### Key

  Not explicitly defined, likely a composite key based on `order_id`, `sku`, `country_code`, and `source_table`.

  ### Partitioning column

  `received_local_time`

  ### Sources

  - `fulfillment-dwh-production.cl_dmart.rb_purchase_orders`
  - `fulfillment-dwh-production.cl_dmart.rb_nonstandard_orders`
  - `fulfillment-dwh-production.cl_dmart.rb_stock_movement`

  ### Life cycle

  Stable.

  ### Data freshness

  This is an incremental table. The last month data are updated/appended with each run (first day of every month).

  ### Owner
  - Team: QCommerce Data Analytics - Commercial team
  - Email: qc_analytics@deliveryhero.com

columns_description:
  - source_table: |
      Source of the data ('orderline', 'stock_movement', or 'returnline').
  - order_type: |
      Type of order ('regular', 'last_updated_po', 'original_of_last_updated_po', 'updated_next_months', 'stock_movement', or 'return').
  - country_code: |
      Two-letter country code.
  - sup_id: |
      Supplier ID.
  - order_id: |
      Order ID.
  - po_id: |
      Purchase Order ID.
  - sku: |
      Stock Keeping Unit (SKU).
  - gross_cost_without_vat: |
      Gross cost excluding VAT.
  - gross_cost: |
      Gross cost including VAT.
  - delivered_quantity: |
      Quantity delivered, adjusted for non-standard orders.
  - ordered_quantity: |
      Quantity ordered.
  - returned_quantity: |
      Quantity returned, adjusted for non-standard orders.
  - trade_cost: |
      Trade cost.
  - fixed_discount: |
      Fixed discount.
  - extra_discount: |
      Extra discount.
  - fixed_vat: |
      Fixed VAT.
  - extra_vat: |
      Extra VAT.
  - internal_tax: |
      Internal tax.
  - created_date: |
      Order creation date.
  - received_local_time: |
      Local timestamp of order delivery or return completion, adjusted for non-standard orders.  Used for partitioning.
  - min_sku_created_month: |
      Earliest creation month for the SKU.
  - min_supp_created_month: |
      Earliest creation month for the supplier.
  - min_sku_supp_created_month: |
      Earliest creation month for the SKU and supplier combination.
  - count_sku_supp_12_month: |
      Count of distinct SKUs for the supplier in the last 12 months.
  - warehouse_type: |
      Warehouse type ('DMART' or 'DISTRIBUTION CENTER').
  - warehouse_id: |
      Warehouse ID.
  - warehouse_name: |
      Warehouse name.
  - fixing_condition: |
      Condition for fixing POs (from stock movements).
  - reason: |
      Reason for return or stock movement.
  - excise_tax: |
      Excise tax is a type of indirect tax levied on the sale or use of particular goods.

dependencies:
  - rb_purchase_orders
  - rb_nonstandard_orders
  - rb_stock_movement

