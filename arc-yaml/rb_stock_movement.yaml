name: rb_stock_movement
table_description: |
  This table aggregates all stock movement data, including country, SKU, supplier, and warehouse-level information.
  ### Key

  PK: `sku` + `global_entity_id` + `country_code` + `sup_id`

  ### Partitioning column

  ### Sources

  - `fulfillment-dwh-production.curated_data_shared.qc_stock_movements`
  - `fulfillment-dwh-production.cl_dmart.rb_products`
  - `fulfillment-dwh-production.cl_dmart.warehouses_v2`

  ### Life cycle

  Stable.

  ### Data freshness

  This is an incremental table. The last month data are updated/appended with each run (first day of every month).

  ### Owner
  - Team: QCommerce Data Analytics - Commercial team
  - Email: qc_analytics@deliveryhero.com

columns_description:
  - source_table: |
      Name of the source table from which the stock movement data is derived.
  - country_code: |
      Two-letter alpha code identifying the country, e.g., 'uy' for Uruguay.
  - global_entity_id: |
      Identifier for the global entity, e.g., 'PY_UY' for PedidosYa Uruguay.
  - sup_id: |
      Supplier ID associated with the stock movement.
  - warehouse_id: |
      ID of the warehouse where the stock movement occurred.
  - warehouse_name: |
      Name of the warehouse corresponding to the warehouse_id.
  - received_local_time: |
      Local timestamp when the stock movement was recorded, truncated to the month level.
  - sku: |
      Stock Keeping Unit (SKU) of the product involved in the stock movement.
  - gross_cost_without_vat: |
      Gross cost of the product involved in the stock movement, excluding VAT.
  - gross_cost: |
      Gross cost of the product involved in the stock movement, including VAT.
  - full_stock_move_reason: |
      Detailed reason for the stock movement, as provided in the source data.
  - warehouse_type: |
      Indicates whether the warehouse is categorized as 'DMART' or 'Distribution Center'.
  - excise_tax: |
      Excise tax is a type of indirect tax levied on the sale or use of particular goods.
  - fixing_condition: |
      Identifies the condition of stock movements that qualify as 'Supplier Return' or 'Fixing PO'.
  - reason: |
      Consolidated or simplified reason derived from the full_stock_move_reason.
  - returned_quantity: |
      Total quantity of the product returned, adjusted based on the stock movement type.
dependencies:
  - rb_products
