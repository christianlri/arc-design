name: rb_contract_info_retro
table_description: |
  This table integrates contract details, opportunity terms, and contract terms with supplier-level and account-level data. It serves as the single source for all active and relevant trading term conditions used in rebate calculations.

  ### Key
  PK: Not explicitly defined, likely a composite key based on `global_supplier_id`, `global_entity_id`, and `contract_term_id`.

  ### Partitioning column
  `month` (DATE, Monthly partitioning).

  ### Sources

  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.contract`: Formal contract header details.
  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.srm_contracttradingterm__c`: Formal contract trading term details.
  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.srm_contracttradingtermtier__c`: Tiered terms details for contracts.
  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.opportunity`: Informal agreement header details.
  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.srm_opportunitytradingterm__c`: Informal agreement trading term details.
  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.account`: Supplier account information.
  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.user`: Account owner (user) information.
  - `{{ params.project_id }}.{{ params.dataset.curated_data_shared_salesforce_srm }}.brand__c`: Brand mapping data.

  ### Life cycle
  Stable.

  ### Data freshness
  This is an incremental table. The last month data are updated/appended with each run (first day of every month).

  ### Owner
  - Team: QCommerce Data Analytics - Commercial team
  - Email: qc_analytics@deliveryhero.com

columns_description:
  - contract_id: |
      Salesforce ID of the new active formal contract.
  - opp_id: |
      Always NULL (CAST AS STRING). Not used in retro overlap logic.
  - term_currency: |
      The ISO currency code defined on the trading term.
  - global_supplier_id: |
      Unique identifier for the supplier (GSID), ensuring global uniqueness across all entities.
  - global_entity_id: |
      Unique identifier for the entity (e.g., 'FP_SG') associated with the contract.
  - contract_status: |
      Hardcoded to 'Active' for these calculated deltas.
  - contract_startdate: |
      The first day of the earliest month in the consolidated overlap period.
  - contract_enddate: |
      The last day of the latest month in the consolidated overlap period.
  - contract_effective_enddate: |
      Matches the consolidated contract_enddate.
  - contract_term_id: |
      Salesforce ID for the specific trading term if linked to a formal contract.
  - opp_term_id: |
      Always NULL (CAST AS STRING).
  - unit_of_measure: |
      Always NULL (CAST AS STRING).
  - trading_term_name: |
      The full name of the trading term (e.g., 'Progressive Rebate').
  - trading_term_type: |
      Hardcoded to 'Retro' to distinguish from 'Rebate' types.
  - term_value_type: |
      The type of value defined on the term (e.g., 'Percentage', 'Absolute').
  - rebate_term_value: |
      The calculated value/rate delta defined on the term.
  - term_applicability: |
      Defines the scope of products the term applies to (e.g., 'Brand', 'Category', 'All Master Product').
  - term_frequency: |
      Hardcoded to 'Monthly' for reconciliation/measurement.
  - waive_condition__c: |
      Always NULL.
  - waive_value__c: |
      Always NULL.
  - term_start_date: |
      First day of the earliest month in the consolidated overlap period.
  - term_start_date_adjusted: |
      Matches the consolidated term_start_date.
  - valid_terms: |
      A boolean flag indicating if the term is considered valid/active (Hardcoded to TRUE).
  - term_end_date: |
      Last day of the latest month in the consolidated overlap period.
  - term_brand_name: |
      The name of the Brand associated with the term, pulled from source.
  - term_comments: |
      Always NULL (CAST AS STRING).
  - term_pim_brand_id: |
      The PIM Brand ID (UUID) associated with the term for easier joining.
  - brand_category_pim: |
      The PIM ID of the Brand or Category the term is applicable to.
  - term_brand_category_name: |
      The name of the Brand or Category the term is applicable to.
  - country_code: |
      Two-letter alpha code identifying the country (from the Account table).
  - country: |
      Full name of the country (from the Account table).
  - supplier_name: |
      The name of the supplier (from the Account table).
  - finance_system_id: |
      The primary supplier finance system ID, consolidated from two potential fields.
  - sup_id: |
      The Supplier Portal ID (SupID) for the supplier.
  - account_id: |
      Salesforce ID of the Supplier Account.
  - contract_term_type: |
      Set to 'Retro_Overlap' to identify the source calculation.
  - account_owner: |
      The username of the Salesforce account owner.
  - trading_term_cluster: |
      Hardcoded to 'standard_terms' for union compatibility.
  - tier_term_rebate_type: |
      Always NULL (CAST AS STRING).
  - tier_term_rebate: |
      Always NULL (CAST AS FLOAT64).
  - tier_term_threshold: |
      Always NULL (CAST AS FLOAT64).
  - tier_thresholdtype: |
      Always NULL (CAST AS STRING).
  - tier_term_number: |
      Always NULL (CAST AS FLOAT64).
  - calculated_against: |
      Always NULL (CAST AS STRING).
  - month: |
      The partition month based on param_month.

create_shared_view: true
filter_by_entity: true
entity_id_column: global_entity_id
time_partitioning: month

