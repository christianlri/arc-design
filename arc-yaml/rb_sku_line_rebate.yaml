name: rb_sku_line_rebate
table_description: |
  This table calculates rebate results  for each SKU, term, and a listing all respective POs related to that Sku.


  ### Key

  PK:  Not explicitly defined, likely a composite key based on `sku`, `order_id`, `global_entity_id`, `sup_id`and potentially other fields.

  ### Partitioning column

  ### Sources

  - `fulfillment-dwh-production.cl_dmart.rb_line_rebate`
  - `fulfillment-dwh-production.cl_dmart.rb_monthly_sku_amount`

  ### Life cycle

  Stable.

  ### Data freshness

  This table is re-created entirely every month with each run of `rebate-calculator-v1` DAG.

  ### Owner
  - Team: QCommerce Data Analytics - Commercial team
  - Email: qc_analytics@deliveryhero.com

columns_description:
  - global_entity_id: |
      Unique identifier for the global entity involved in the transaction.
  - country_code: |
      ISO code representing the country where the transaction occurred.
  - country: |
      Full name of the country related to the transaction.
  - global_supplier_id: |
      Unique identifier for the supplier on a global scale.
  - sku: |
      Stock Keeping Unit representing the specific product.
  - supplier_name: |
      Name of the supplier associated with the SKU.
  - finance_system_id: |
      Identifier for the financial system managing the transaction.
  - sup_id: |
      Internal supplier identifier.
  - unit_of_measure: |
      Unit in which the product is measured (e.g., kilograms, liters, units).
  - trading_term_name: |
      Name of the trading term applied in the rebate calculation.
  - trading_term_type: |
      Type or category of the trading term (e.g., volume-based, value-based).
  - rebate_term_value: |
      The monetary or percentage value of the rebate term.
  - term_value_type: |
      Specifies whether the rebate term value is a percentage or fixed amount.
  - term_start_date: |
      Start date of the rebate term’s validity.
  - term_applicability: |
      Conditions or applicability of the rebate term.
  - term_frequency: |
      Frequency of the rebate term’s application (e.g., monthly, quarterly).
  - term_end_date: |
      End date of the rebate term’s validity.
  - month: |
      The month for which the rebate is calculated.
  - rebate_currency: |
      Currency in which the rebate is denominated.
  - contract_id: |
      Unique identifier of the associated contract.
  - opp_id: |
      Opportunity ID tied to the transaction (e.g., from Salesforce).
  - account_id: |
      Identifier for the account associated with the rebate transaction.
  - account_owner: |
      The owner of the account managing the rebate transaction.
  - contract_startdate: |
      Start date of the associated contract.
  - contract_enddate: |
      End date of the associated contract.
  - contract_effective_enddate: |
      Effective end date of the contract’s applicability.
  - contract_status: |
      Status of the associated contract (e.g., active, expired).
  - contract_term_type: |
      The type or category of the contract term.
  - contract_term_id: |
      Unique identifier of the contract term.
  - opp_term_id: |
      Identifier of the opportunity term.
  - term_pim_brand_id: |
      Unique identifier for the product’s brand within the PIM system.
  - sku_brand_name: |
      Name of the brand associated with the SKU.
  - sku_categ_level_one to sku_categ_level_six: |
      Hierarchical levels of product categorization, from broad categories to more specific classifications.
  - barcodes: |
      A concatenated list of barcodes linked to the SKU.
  - received_local_month: |
      Month when the SKU was received in the local context.
  - delivered_net_amount: |
      Total net amount of the SKU delivered.
  - returned_net_amount: |
      Total net amount of the SKU returned.
  - delivered_gross_amount: |
      Total gross amount of the SKU delivered.
  - returned_gross_amount: |
      Total gross amount of the SKU returned.
  - sup_net_purchase: |
      Aggregate net purchase amount for the supplier across all SKUs.
  - sup_net_return: |
      Aggregate net return amount for the supplier across all SKUs.
  - sup_gross_purchase: |
      Aggregate gross purchase amount for the supplier across all SKUs.
  - sup_gross_return: |
      Aggregate gross return amount for the supplier across all SKUs.
  - sup_valid_gross_purchase: |
      Valid gross purchase amount for the supplier.
  - sup_valid_gross_return: |
      Valid gross return amount for the supplier.
  - sup_valid_net_purchase: |
      Valid net purchase amount for the supplier.
  - sup_valid_net_return: |
      Valid net return amount for the supplier.
  - sup_term_valid_gross_purchase: |
      Valid gross purchase amount under the specific rebate term.
  - sup_term_valid_gross_return: |
      Valid gross return amount under the specific rebate term.
  - sup_term_valid_net_purchase: |
      Valid net purchase amount under the specific rebate term.
  - sup_term_valid_net_return: |
      Valid net return amount under the specific rebate term.
  - excise_tax: |
      Excise tax is a type of indirect tax levied on the sale or use of particular goods.
  - fixed_vat_percentage: |
      This is simply the set percentage rate for Value Added Tax (VAT).
  - fixed_vat: |
       Absolute amount of VAT that's charged.
  - poid_list: |
      Concatenated list of distinct purchase order IDs associated with the rebate, ordered by ID.
  - total_rebate: |
      Total rebate amount aggregated for the SKU across all applicable terms.

dependencies:
  - rb_line_rebate
  - rb_monthly_sku_amount
